spring.application.name=FitEdge
server.port=8080

# Google OAuth2 Credentials (USER MUST PROVIDE THESE)
spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=https://www.googleapis.com/auth/fitness.activity.read,https://www.googleapis.com/auth/fitness.body.read,https://www.googleapis.com/auth/fitness.heart_rate.read

# Database (H2 for demo)
spring.datasource.url=jdbc:h2:mem:fitedgedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
